[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Overridden at runtime from DATABASE_URL env var in alembic/env.py
sqlalchemy.url = postgresql+asyncpg://si_user:si_pass@localhost:5432/store_intelligence

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
