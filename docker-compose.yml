version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-store_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-si_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-si_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-si_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-si_user}:${POSTGRES_PASSWORD:-si_pass}@db:5432/${POSTGRES_DB:-store_intelligence}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STAFF_COLOR_HEX: ${STAFF_COLOR_HEX:-1A6B3C}
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  pg_data:
